<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .calendar-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
        }
        .month {
            display: none;
            margin-bottom: 20px;
        }
        .month.active {
            display: block;
        }
        .arrows {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
        }
        .arrow {
            cursor: pointer;
            font-size: 24px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="arrows">
            <button class="arrow" id="prev">&lt; Prev</button>
            <h2 id="monthTitle">March</h2>
            <button class="arrow" id="next">Next &gt;</button>
        </div>
        
        <div id="March" class="month active">
            <h3>March</h3>
            <table>
                <tr>
                    <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                </tr>
                <tr><td></td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td></tr>
                <tr><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td><td>12</td><td>13</td></tr>
                <tr><td>14</td><td>15</td><td>16</td><td>17</td><td>18</td><td>19</td><td>20</td></tr>
                <tr><td>21</td><td>22</td><td>23</td><td>24</td><td>25</td><td>26</td><td>27</td></tr>
                <tr><td>28</td><td>29</td><td>30</td><td>31</td><td></td><td></td><td></td></tr>
            </table>
        </div>

        <div id="April" class="month">
            <h3>April</h3>
            <table>
                <tr>
                    <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                </tr>
                <tr><td></td><td></td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td></tr>
                <tr><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td><td>12</td></tr>
                <tr><td>13</td><td>14</td><td>15</td><td>16</td><td>17</td><td>18</td><td>19</td></tr>
                <tr><td>20</td><td>21</td><td>22</td><td>23</td><td>24</td><td>25</td><td>26</td></tr>
                <tr><td>27</td><td>28</td><td>29</td><td>30</td><td></td><td></td><td></td></tr>
            </table>
        </div>


    </div>

    <script>
        let currentMonth = 0; 
        const months = ['March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        const monthTitle = document.getElementById('monthTitle');
        
        function showMonth(monthIndex) {
            document.querySelectorAll('.month').forEach(month => month.classList.remove('active'));
            
            document.getElementById(months[monthIndex]).classList.add('active');
            monthTitle.textContent = months[monthIndex];
        }

        document.getElementById('next').addEventListener('click', () => {
            if (currentMonth < months.length - 1) {
                currentMonth++;
                showMonth(currentMonth);
            }
        });

        document.getElementById('prev').addEventListener('click', () => {
            if (currentMonth > 0) {
                currentMonth--;
                showMonth(currentMonth);
            }
        });
    </script>
</body>
</html>
