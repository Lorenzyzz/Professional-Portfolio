<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive To-Do List</title>
</head>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: start;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color:#a87e7e;
            padding: 20px;
            box-shadow: 0 4px 8px rgb(22, 22, 22);
            width: 300px;
            border-radius: 8px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        input {
            width: 70%;
            padding: 8px;
            margin-right: 10px;
            border: 1px solid #000000;
            border-radius: 4px;
        }

        button {
            padding: 8px 12px;
            background-color:   #000000;
            color: rgb(124, 109, 109);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow:0 4px 8px #000000;
        }

        button:hover {
            background-color: #c9aeae;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #5b00ee;
            font-size: 18px;
        }

        li.completed {
            text-decoration: line-through;
            color: rgb(255, 0, 0);
        }

        button.delete-btn {
            background-color: #9c352a;
        }

        button.delete-btn:hover {
            background-color: #d4af08;
        }

    </style>
<script>
    
const taskInput = document.getElementById("taskInput");
const addTaskBtn = document.getElementById("addTaskBtn");
const taskList = document.getElementById("taskList");


let tasks = JSON.parse(localStorage.getItem("tasks")) || [];


function renderTasks() {
    taskList.innerHTML = "";
    tasks.forEach((task, index) => {
        const li = document.createElement("li");
        li.classList.toggle("completed", task.completed);
        
        const text = document.createElement("span");
        text.textContent = task.text;
        text.addEventListener("click", () => toggleTask(index)); // Mark as completed

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.classList.add("delete-btn");
        deleteBtn.addEventListener("click", () => deleteTask(index)); // Delete task

        li.appendChild(text);
        li.appendChild(deleteBtn);
        taskList.appendChild(li);
    });
}


function addTask() {
    const taskText = taskInput.value.trim();
    if (taskText !== "") {
        tasks.push({ text: taskText, completed: false });
        taskInput.value = "";
        updateLocalStorage();
        renderTasks();
    }
}


function toggleTask(index) {
    tasks[index].completed = !tasks[index].completed;
    updateLocalStorage();
    renderTasks();
}


function deleteTask(index) {
    tasks.splice(index, 1);
    updateLocalStorage();
    renderTasks();
}


function updateLocalStorage() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}


addTaskBtn.addEventListener("click", addTask);


taskInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
        addTask();
    }
});


renderTasks();
s
</script>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <input type="text" id="taskInput" placeholder="Add a new task" />
        <button id="addTaskBtn">Add Task</button>
        <ul id="taskList"></ul>
    </div>

   
</body>
</html>
